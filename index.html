<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티셔츠 불출 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .checked-item { background-color: #fef2f2; border-color: #fee2e2; color: #ef4444; }
        .checked-item span { color: #ef4444; font-weight: 600; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
        .member-chip { transition: all 0.2s; border: 1px solid #f3f4f6; background-color: #f9fafb; color: #4b5563; cursor: pointer; }
        .member-chip:hover { background-color: #f3f4f6; border-color: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <!-- 로딩 화면 -->
    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-sm text-gray-500 font-medium">시스템을 준비 중입니다...</p>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- 헤더 -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2 text-gray-900">
                    <i class="fas fa-tshirt text-blue-500"></i>
                    티셔츠 불출 관리 대시보드
                </h1>
                <p class="text-gray-400 text-xs mt-1">실시간 클라우드 동기화 활성화됨</p>
            </div>
            
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                <input type="text" id="searchInput" placeholder="이름 검색..." 
                    class="pl-9 pr-4 py-2 bg-white border border-gray-100 rounded-lg w-full md:w-64 text-sm focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all">
            </div>
        </header>

        <!-- 요약 통계 -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl border border-gray-100 text-center shadow-sm">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">전체</p>
                <h3 class="text-xl font-bold text-gray-800" id="totalCount">0</h3>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-100 text-center shadow-sm">
                <p class="text-[10px] text-green-500 font-bold uppercase mb-1">수령</p>
                <h3 class="text-xl font-bold text-green-600" id="completedCount">0</h3>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-100 text-center shadow-sm">
                <p class="text-[10px] text-orange-400 font-bold uppercase mb-1">미수령</p>
                <h3 class="text-xl font-bold text-orange-500" id="remainingCount">0</h3>
            </div>
        </div>

        <!-- 리스트 컨테이너 -->
        <div id="dashboardContent" class="bg-white rounded-2xl border border-gray-100 shadow-sm divide-y divide-gray-50">
            <!-- 자바스크립트에서 즉시 렌더링됨 -->
        </div>

        <!-- 푸터 -->
        <footer class="mt-12 mb-10 text-center">
            <button onclick="resetData()" class="text-gray-300 hover:text-red-400 text-[11px] font-medium transition-colors">
                데이터 초기화
            </button>
            <p class="text-gray-300 text-[10px] mt-4">개발자: 김병찬</p>
        </footer>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tshirt-manager-vfinal';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const initialData = [
            { id: 'm95', label: '남자 95', members: ['임성민', '윤상철', '최시원', '황석출'] },
            { id: 'm100', label: '남자 100', members: ['이수중', '이보영', '이승환', '김상기', '김건호', '김근호', '김영진', '김옥수', '김종혁', '김해용', '박남순', '박재만', '백상현', '손원철', '이숙자', '이재경', '이태관', '하우태', '홍정헌', '황석현'] },
            { id: 'm105', label: '남자 105', members: ['김병찬', '김상훈', '김용철', '김정일', '손영수', '이재민', '이청호', '조현곤', '차동환', '김수', '손경민'] },
            { id: 'm110', label: '남자 110', members: ['조창재', '박성진', '박학봉', '정주한'] },
            { id: 'w85', label: '여자 85', members: ['최유경'] },
            { id: 'w90', label: '여자 90', members: ['장수진', '노석영', '류시영', '전지현', '조목화', '한미희', '한효민'] },
            { id: 'w95', label: '여자 95', members: ['권오령', '도병국', '박주은', '손지현', '유윤화', '이혜지', '조정수', '차신효'] },
            { id: 'w100', label: '여자 100', members: ['김을숙', '정경희', '정미경'] }
        ];

        let receivedStatus = {};
        let user = null;

        const hideLoading = () => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        };

        const getStatusDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'v1', 'status_data');

        // 메인 실행 흐름
        window.addEventListener('DOMContentLoaded', () => {
            // 1. UI 즉시 렌더링 (데이터가 오기 전에도 빈 상태로 보여줌)
            renderDashboard();
            updateStats();

            // 2. 강제 로딩 해제 (최대 1.5초 대기)
            setTimeout(hideLoading, 1500);

            // 3. 인증 및 데이터 연동
            initAuth();
        });

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error:", e);
                hideLoading();
            }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                subscribeToData();
            }
        });

        function subscribeToData() {
            const statusDoc = getStatusDocRef();
            onSnapshot(statusDoc, (docSnap) => {
                if (docSnap.exists()) {
                    receivedStatus = docSnap.data().status || {};
                    renderDashboard();
                    updateStats();
                }
                hideLoading();
            }, (error) => {
                console.error("Firestore error:", error);
                hideLoading();
            });
        }

        async function updateCloudStorage() {
            if (!user) return;
            try {
                const statusDoc = getStatusDocRef();
                await setDoc(statusDoc, { status: receivedStatus }, { merge: true });
            } catch (e) {
                console.error("Sync error:", e);
            }
        }

        window.toggleStatus = async function(member, groupId) {
            const key = `${member}-${groupId}`;
            receivedStatus[key] = !receivedStatus[key];
            renderDashboard();
            updateStats();
            await updateCloudStorage();
        }

        window.resetData = async function() {
            if(confirm('모든 수령 현황을 초기화하시겠습니까?')) {
                receivedStatus = {};
                renderDashboard();
                updateStats();
                await updateCloudStorage();
            }
        }

        function updateStats() {
            let total = 0;
            let completed = 0;
            initialData.forEach(group => {
                group.members.forEach(member => {
                    total++;
                    if (receivedStatus[`${member}-${group.id}`]) completed++;
                });
            });

            document.getElementById('totalCount').innerText = total;
            document.getElementById('completedCount').innerText = completed;
            document.getElementById('remainingCount').innerText = total - completed;
        }

        function renderDashboard() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('dashboardContent');
            if (!container) return;
            container.innerHTML = '';

            initialData.forEach(group => {
                const filteredMembers = group.members.filter(m => m.toLowerCase().includes(searchTerm));
                if (filteredMembers.length === 0 && searchTerm !== '') return;

                const row = document.createElement('div');
                row.className = 'flex items-start p-4 md:p-6 gap-6';

                const labelBox = `
                    <div class="w-24 shrink-0">
                        <h4 class="text-sm font-bold text-gray-700">${group.label} <span class="text-gray-300 font-normal ml-1">호</span></h4>
                    </div>
                `;

                const countBox = `
                    <div class="w-10 h-10 shrink-0 bg-blue-50 rounded-full flex items-center justify-center">
                        <span class="text-blue-600 font-bold text-sm">${group.members.length}</span>
                    </div>
                `;

                const chips = filteredMembers.map(member => {
                    const isChecked = receivedStatus[`${member}-${group.id}`];
                    return `
                        <button onclick="toggleStatus('${member}', '${group.id}')" 
                            class="member-chip px-3 py-1.5 rounded-md text-xs font-medium ${isChecked ? 'checked-item' : ''}">
                            <span>${member}</span>
                        </button>
                    `;
                }).join('');

                row.innerHTML = `
                    ${labelBox}
                    ${countBox}
                    <div class="flex flex-wrap gap-2">
                        ${chips}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        document.getElementById('searchInput').addEventListener('input', renderDashboard);
    </script>
</body>
</html>
