<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티셔츠 불출 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .checked-item { background-color: #f0fdf4; border-color: #bbf7d0; color: #15803d; text-decoration: line-through; opacity: 0.7; }
        .checkbox-custom { width: 20px; height: 20px; border: 2px solid #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .checked-item .checkbox-custom { background-color: #22c55e; border-color: #22c55e; }
        .checked-item .checkbox-custom::after { content: '\f00c'; font-family: 'Font Awesome 5 Free'; font-weight: 900; color: white; font-size: 10px; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- 헤더 -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i class="fas fa-tshirt text-blue-600"></i>
                    티셔츠 불출 관리 대시보드
                </h1>
                <p class="text-gray-500 text-sm mt-1">어느 기기에서든 실시간으로 동기화됩니다. (Cloud Storage 적용됨)</p>
            </div>
            
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="이름 검색..." 
                    class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </header>

        <!-- 요약 통계 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">전체 인원</p>
                    <h3 class="text-2xl font-bold" id="totalCount">0</h3>
                </div>
                <div class="bg-blue-50 p-3 rounded-lg text-blue-600"><i class="fas fa-users text-xl"></i></div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-xs text-green-600 font-semibold uppercase tracking-wider">불출 완료</p>
                    <h3 class="text-2xl font-bold" id="completedCount">0</h3>
                </div>
                <div class="bg-green-50 p-3 rounded-lg text-green-600"><i class="fas fa-check-circle text-xl"></i></div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-xs text-orange-600 font-semibold uppercase tracking-wider">미수령</p>
                    <h3 class="text-2xl font-bold" id="remainingCount">0</h3>
                </div>
                <div class="bg-orange-50 p-3 rounded-lg text-orange-600"><i class="fas fa-clock text-xl"></i></div>
            </div>
        </div>

        <!-- 리스트 컨테이너 -->
        <div id="dashboardContent" class="space-y-6">
            <!-- 자바스크립트에서 렌더링됨 -->
        </div>

        <!-- 푸터 제어 및 개발자 정보 -->
        <footer class="mt-12 mb-20 text-center space-y-4">
            <button onclick="resetData()" class="text-gray-400 hover:text-red-500 text-sm font-medium flex items-center justify-center gap-2 mx-auto transition-colors">
                <i class="fas fa-redo"></i> 전체 데이터 초기화
            </button>
            <div class="pt-8 border-t border-gray-200">
                <p class="text-gray-400 text-xs">
                    <span class="font-semibold">개발자: 김병찬</span>
                </p>
            </div>
        </footer>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 환경 설정 (자동 주입되는 값 사용)
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tshirt-app';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const initialData = [
            { id: 'm95', gender: '남자', size: '95', members: ['임성민', '윤상철', '최시원', '황석출'] },
            { id: 'm100', gender: '남자', size: '100', members: ['이수중', '이보영', '이승환', '김상기', '김건호', '김근호', '김영진', '김옥수', '김종혁', '김해용', '박남순', '박재만', '백상현', '손원철', '이숙자', '이재경', '이태관', '하우태', '홍정헌', '황석현'] },
            { id: 'm105', gender: '남자', size: '105', members: ['김병찬', '김상훈', '김용철', '김정일', '손영수', '이재민', '이청호', '조현곤', '차동환', '김수', '손경민'] },
            { id: 'm110', gender: '남자', size: '110', members: ['조창재', '박성진', '박학봉', '정주한'] },
            { id: 'w85', gender: '여자', size: '85', members: ['최유경'] },
            { id: 'w90', gender: '여자', size: '90', members: ['장수진', '노석영', '류시영', '전지현', '조목화', '한미희', '한효민'] },
            { id: 'w95', gender: '여자', size: '95', members: ['권오령', '도병국', '박주은', '손지현', '유윤화', '이혜지', '조정수', '차신효'] },
            { id: 'w100', gender: '여자', size: '100', members: ['김을숙', '정경희', '정미경'] }
        ];

        let receivedStatus = {};
        let user = null;

        // Firestore 경로 설정 (필수: 6개의 세그먼트 사용)
        // 규칙: /artifacts/{appId}/public/data/{collectionName}/{documentId}
        const getStatusDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'status_collection', 'tshirt_status');

        // 초기화 및 인증
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth failed", e);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                subscribeToData();
            }
        });

        // 실시간 데이터 구독 (Firestore)
        function subscribeToData() {
            const statusDoc = getStatusDocRef();
            onSnapshot(statusDoc, (docSnap) => {
                if (docSnap.exists()) {
                    receivedStatus = docSnap.data().status || {};
                } else {
                    receivedStatus = {};
                }
                renderDashboard();
                updateStats();
                document.getElementById('loading').style.display = 'none';
            }, (error) => {
                console.error("Firestore error", error);
                document.getElementById('loading').style.display = 'none';
            });
        }

        async function updateCloudStorage() {
            if (!user) return;
            try {
                const statusDoc = getStatusDocRef();
                await setDoc(statusDoc, { status: receivedStatus });
            } catch (e) {
                console.error("Save failed", e);
            }
        }

        window.toggleStatus = async function(member, groupId) {
            const key = `${member}-${groupId}`;
            receivedStatus[key] = !receivedStatus[key];
            await updateCloudStorage();
        }

        window.resetData = async function() {
            if(confirm('모든 수령 현황을 초기화하시겠습니까? 다른 기기에서도 모두 초기화됩니다.')) {
                receivedStatus = {};
                await updateCloudStorage();
            }
        }

        function updateStats() {
            let total = 0;
            let completed = 0;
            initialData.forEach(group => {
                group.members.forEach(member => {
                    total++;
                    if (receivedStatus[`${member}-${group.id}`]) completed++;
                });
            });

            document.getElementById('totalCount').innerText = total;
            document.getElementById('completedCount').innerText = completed;
            document.getElementById('remainingCount').innerText = total - completed;
        }

        function renderDashboard() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('dashboardContent');
            container.innerHTML = '';

            initialData.forEach(group => {
                const filteredMembers = group.members.filter(m => m.toLowerCase().includes(searchTerm));
                
                if (filteredMembers.length === 0 && searchTerm !== '') return;

                const groupCompleted = group.members.filter(m => receivedStatus[`${m}-${group.id}`]).length;
                const progress = (groupCompleted / group.members.length) * 100;

                const groupSection = document.createElement('div');
                groupSection.className = 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden';
                
                let membersHtml = filteredMembers.map(member => {
                    const isChecked = receivedStatus[`${member}-${group.id}`];
                    return `
                        <button onclick="toggleStatus('${member}', '${group.id}')" 
                            class="flex items-center gap-3 p-3 rounded-lg border transition-all text-left hover:shadow-sm ${isChecked ? 'checked-item' : 'bg-white border-gray-100 hover:border-blue-200 hover:bg-blue-50'}">
                            <div class="checkbox-custom"></div>
                            <span class="font-medium truncate">${member}</span>
                        </button>
                    `;
                }).join('');

                groupSection.innerHTML = `
                    <div class="p-4 bg-gray-50/50 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-800 text-white px-3 py-1 rounded-full text-xs font-bold uppercase">
                                ${group.gender} ${group.size}호
                            </span>
                            <span class="text-sm text-gray-500 font-medium">${group.members.length}명</span>
                        </div>
                        <div class="flex items-center gap-3 flex-1 max-w-xs">
                            <div class="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full bg-green-500 transition-all" style="width: ${progress}%"></div>
                            </div>
                            <span class="text-[10px] font-bold text-gray-400 w-8">${Math.round(progress)}%</span>
                        </div>
                    </div>
                    <div class="p-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                        ${membersHtml}
                    </div>
                `;
                container.appendChild(groupSection);
            });
        }

        document.getElementById('searchInput').addEventListener('input', renderDashboard);
        initAuth();
    </script>
</body>
</html>
